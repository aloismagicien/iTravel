<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iTravel Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 30px 0; text-align: center; position: relative; }
        h1 { font-weight: 200; letter-spacing: 6px; text-transform: uppercase; font-size: 1.2rem; margin: 0; }
        
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; width: 100%; }
        
        #perform-btn { background: none; border: 1px solid #fff; color: #fff; padding: 20px 0; width: 220px; font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; z-index: 10; }
        
        #cam-container { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 80px; border: 1px solid rgba(255,255,255,0.4); border-radius: 5px; pointer-events: none; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #fff; box-shadow: 0 0 10px #fff; animation: move 2s infinite ease-in-out; }
        @keyframes move { 0%, 100% { top: 0; } 50% { top: 100%; } }

        #flash-btn { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; background: none; border: none; color: #fff; display: none; z-index: 20; }
        
        .log { position: absolute; bottom: 80px; width: 100%; text-align: center; font-size: 10px; color: #555; letter-spacing: 1px; font-family: monospace; }
        footer { padding: 20px 0; text-align: center; font-size: 0.6rem; color: #333; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <h1>iTravel</h1>
        <button id="flash-btn">⚡</button>
    </header>

    <div id="main">
        <button id="perform-btn">Perform</button>
        
        <div id="cam-container">
            <video id="video" autoplay playsinline></video>
            <div id="overlay"><div class="scan-line"></div></div>
        </div>

        <div class="log" id="logger">IDLE</div>
    </div>

    <footer>ITRAVEL - ALOÏS 2026 - ALL RIGHTS RESERVED</footer>

    <script>
        const btn = document.getElementById('perform-btn');
        const camContainer = document.getElementById('cam-container');
        const video = document.getElementById('video');
        const flashBtn = document.getElementById('flash-btn');
        const logger = document.getElementById('logger');
        let track = null;

        const t9Map = {'a':'2','b':'2','c':'2','d':'3','e':'3','f':'3','g':'4','h':'4','i':'4','j':'5','k':'5','l':'5','m':'6','n':'6','o':'6','p':'7','q':'7','r':'7','s':'7','t':'8','u':'8','v':'8','w':'9','x':'9','y':'9','z':'9'};
        const toT9 = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").split('').map(c => t9Map[c] || '').join('');

        const rawDests = ["Paris","Marseille","Lyon","Toulouse","Nice","Nantes","Montpellier","Strasbourg","Bordeaux","Lille","Londres","NewYork","Miami","Tokyo","Barcelone","Madrid","Rome","Milan","Berlin","France","Espagne","Italie","Portugal","Grece","Canada"];
        const T9_DB = {};
        rawDests.forEach(d => { T9_DB[toT9(d)] = d; });

        btn.addEventListener('click', async () => {
            btn.style.display = 'none';
            camContainer.style.display = 'block';
            flashBtn.style.display = 'block';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                track = stream.getVideoTracks()[0];
                startOCR();
            } catch (e) { alert("Erreur: Vérifiez HTTPS et les permissions."); }
        });

        flashBtn.addEventListener('click', () => {
            if(track) {
                const caps = track.getCapabilities();
                if(caps.torch) {
                    const settings = track.getSettings();
                    track.applyConstraints({ advanced: [{ torch: !settings.torch }] });
                }
            }
        });

        async function startOCR() {
            logger.innerText = "ENGINE LOADING...";
            const worker = await Tesseract.createWorker('eng');
            await worker.setParameters({ tessedit_char_whitelist: '0123456789' });
            logger.innerText = "ACTIVE SCAN (10Hz)";

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            async function loop() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    // Crop central pour rapidité
                    const sw = video.videoWidth;
                    const sh = 100; // Hauteur du bandeau de scan
                    canvas.width = sw;
                    canvas.height = sh;
                    ctx.drawImage(video, 0, (video.videoHeight/2)-(sh/2), sw, sh, 0, 0, sw, sh);

                    const { data: { text } } = await worker.recognize(canvas);
                    const found = text.replace(/\D/g, '');
                    
                    if(found.length >= 4) {
                        for (let code in T9_DB) {
                            if (found.includes(code)) {
                                logger.innerText = "MATCH: " + T9_DB[code];
                                setTimeout(() => {
                                    window.location.href = `https://www.google.com/search?q=Meilleurs+hôtels+${encodeURIComponent(T9_DB[code])}`;
                                }, 300);
                                return;
                            }
                        }
                    }
                }
                requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
</html>
