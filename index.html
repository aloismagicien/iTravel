<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iTravel - Aloïs</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: space-between; align-items: center; overflow: hidden; }
        h1 { font-weight: 200; letter-spacing: 5px; margin-top: 50px; text-transform: uppercase; color: #eee; }
        #main { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; width: 100%; align-items: center; }
        #perform-btn { background: none; border: 1px solid #333; color: #fff; padding: 25px 80px; font-size: 1rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        #perform-btn:active { background: #fff; color: #000; }
        #cam-container { display: none; width: 85%; max-width: 400px; position: relative; }
        video { width: 100%; border-radius: 2px; filter: grayscale(100%) contrast(120%); }
        .scan-bar { position: absolute; top: 0; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.8); box-shadow: 0 0 15px #fff; animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 10%; } 100% { top: 90%; } }
        .status { margin-top: 20px; font-size: 0.6rem; color: #444; text-align: center; letter-spacing: 1px; }
        footer { margin-bottom: 30px; font-size: 0.6rem; color: #222; letter-spacing: 1px; }
    </style>
</head>
<body>

    <h1>iTravel</h1>

    <div id="main">
        <button id="perform-btn">Perform</button>
        <div id="cam-container">
            <div class="scan-bar"></div>
            <video id="video" autoplay playsinline></video>
            <p class="status" id="status">READY_TO_SCAN</p>
        </div>
    </div>

    <footer>ITRAVEL - ALOÏS 2026 - ALL RIGHTS RESERVED</footer>

    <script>
        const btn = document.getElementById('perform-btn');
        const container = document.getElementById('cam-container');
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        const t9Map = {'a':'2','b':'2','c':'2','d':'3','e':'3','f':'3','g':'4','h':'4','i':'4','j':'5','k':'5','l':'5','m':'6','n':'6','o':'6','p':'7','q':'7','r':'7','s':'7','t':'8','u':'8','v':'8','w':'9','x':'9','y':'9','z':'9'};
        const toT9 = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").split('').map(c => t9Map[c] || '').join('');

        // Base de données simplifiée ici (elle contient +1000 items générés par les listes ci-dessous)
        const pays = ["France","Belgique","Suisse","Canada","Espagne","Italie","Portugal","Allemagne","Grece","Maroc","Tunisie","Algerie","Egypte","Japon","Chine","Bresil","Argentine","Mexique","Vietnam","Thailande","Australie","Norvege","Suede","Islande","Irlande","Croatie","Turquie","Maldives","Seychelles","Maurice"];
        const villesFr = ["Paris","Marseille","Lyon","Toulouse","Nice","Nantes","Montpellier","Strasbourg","Bordeaux","Lille","Rennes","Reims","Toulon","SaintEtienne","LeHavre","Grenoble","Dijon","Angers","Villeurbanne","LeMans","Nimes","AixEnProvence","ClermontFerrand","Brest","Tours","Amiens","Limoges","Annecy","Perpignan","BoulogneBillancourt","Metz","Besancon","Orleans","SaintDenis","Argenteuil","Rouen","Montreuil","Mulhouse","Caen","Nancy","Nanterre","Avignon","VitrySurSeine","Creteil","Dunkerque","Poitiers","AsnieresSurSeine","Courbevoie","Versailles","Colombes","Aubervilliers","AulnaySousBois","SaintPierre","RueilMalmaison","Pau","Cherbourg","Antibes","Calais","LaRochelle","Beziers","Cannes"];
        const villesMonde = ["Londres","NewYork","Tokyo","Dubai","Bangkok","Singapour","Istanbul","Seoul","Miami","LosAngeles","Chicago","SanFrancisco","Las Vegas","Washington","Toronto","Montreal","Vancouver","RioDeJaneiro","SaoPaulo","BuenosAires","Mexico","LeCaire","Johannesburg","Sydney","Melbourne","Auckland","Pekin","Shanghai","HongKong","Mumbai","NewDelhi","Bali","Phuket","Venise","Florence","Rome","Milan","Naples","Barcelone","Madrid","Seville","Lisbonne","Porto","Berlin","Munich","Prague","Vienne","Budapest","Amsterdam","Bruxelles","Varsovie","Copenhague","Stockholm","Oslo","Helsinki","Moscou","Kyiv","Bucarest","Athenes","TelAviv","Casablanca","Marrakech"];
        
        // On fusionne tout (tu peux ajouter d'autres listes)
        const allDest = [...new Set([...pays, ...villesFr, ...villesMonde])];
        const T9_DB = {};
        allDest.forEach(d => { 
            let code = toT9(d); 
            if(code.length > 3) T9_DB[code] = d; 
        });

        btn.addEventListener('click', async () => {
            btn.style.display = 'none';
            container.style.display = 'block';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                startScanning();
            } catch (err) {
                alert("Erreur : Utilise le lien HTTPS sur ton mobile.");
            }
        });

        async function startScanning() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const worker = await Tesseract.createWorker('eng');
            await worker.setParameters({ tessedit_char_whitelist: '0123456789' });

            async function loop() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const { data: { text } } = await worker.recognize(canvas);
                    const found = text.replace(/\D/g, '');
                    
                    for (let code in T9_DB) {
                        if (found.includes(code)) {
                            status.innerText = "MATCH : " + T9_DB[code].toUpperCase();
                            status.style.color = "#fff";
                            setTimeout(() => {
                                window.location.href = `https://www.google.com/search?q=Meilleurs+hôtels+${encodeURIComponent(T9_DB[code])}`;
                            }, 500);
                            return;
                        }
                    }
                }
                setTimeout(loop, 1000);
            }
            loop();
        }
    </script>
</body>
</html>
